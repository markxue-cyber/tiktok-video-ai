<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TikGen AI 工作台预览 3</title>
    <link rel="stylesheet" href="/workbench-preview/style.css" />
  </head>
  <body>
    <div class="wrap">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div class="title">TikGen AI</div>
        </div>

        <nav class="sideNav">
          <div class="navItem active">
            <div class="navIcon">创</div>
            <div class="navText">创作实验室</div>
          </div>
          <div class="navItem">
            <div class="navIcon">历</div>
            <div class="navText">历史传</div>
          </div>
          <div class="navItem">
            <div class="navIcon">生</div>
            <div class="navText">生成</div>
          </div>
          <div class="navItem">
            <div class="navIcon">资</div>
            <div class="navText">本地资产</div>
          </div>
          <div class="navItem">
            <div class="navIcon">预</div>
            <div class="navText">预设</div>
          </div>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topLeft">
            <div class="crumb">素材与模板</div>
            <div class="pill">Curtain Mode</div>
          </div>
          <div class="search">
            <span style="opacity:.75;font-weight:900">⌕</span>
            <input value="搜索" />
          </div>
        </header>

        <section class="curtainRow">
          <div class="curtainBanner">
            <div class="bannerBadge">模板库</div>
            <div class="bannerTitle">一键套用结构化脚本</div>
            <div class="bannerSub">静态示意：模板卡片的幕布玻璃拟态风格，强调“高端+科技”的层次感。</div>
          </div>
          <div class="curtainBanner">
            <div class="bannerBadge">本地资产</div>
            <div class="bannerTitle">素材时间线（视觉）</div>
            <div class="bannerSub">展示：本地上传素材、AI生成结果、以及按类型切换的深色 UI 轮廓。</div>
          </div>
        </section>

        <section class="bottomRow">
          <div class="panel">
            <div class="panelTitle">模板（静态）</div>
            <div class="filters" style="margin-top:4px">
              <div class="filterBtn active">全部</div>
              <div class="filterBtn">电商</div>
              <div class="filterBtn">探店</div>
              <div class="filterBtn">测评</div>
            </div>
            <div style="margin-top:12px;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px">
              <div class="toolCard">
                <div class="toolTop"><div class="toolIcon">图</div><div class="toolArrow">→</div></div>
                <div class="toolLabel">功能示意图</div>
              </div>
              <div class="toolCard">
                <div class="toolTop"><div class="toolIcon">海</div><div class="toolArrow">→</div></div>
                <div class="toolLabel">场景对比海报</div>
              </div>
              <div class="toolCard">
                <div class="toolTop"><div class="toolIcon">脚</div><div class="toolArrow">→</div></div>
                <div class="toolLabel">镜头化脚本</div>
              </div>
              <div class="toolCard">
                <div class="toolTop"><div class="toolIcon">风</div><div class="toolArrow">→</div></div>
                <div class="toolLabel">电商质感风</div>
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="panelTitle">素材预览（静态）</div>
            <div class="filters" style="margin-top:4px">
              <div class="filterBtn active">全部</div>
              <div class="filterBtn">图片</div>
              <div class="filterBtn">视频</div>
            </div>
            <div class="thumbRow" style="margin-top:12px">
              <div class="thumb"><div class="thumbBadge">15s</div></div>
              <div class="thumb"><div class="thumbBadge">19s</div></div>
              <div class="thumb"><div class="thumbBadge">5s</div></div>
              <div class="thumb"><div class="thumbBadge">10s</div></div>
              <div class="thumb"><div class="thumbBadge">8s</div></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
