<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TikGen UI Concepts</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        color: #0f172a;
        background: radial-gradient(1200px 600px at 10% -20%, #dbeafe 0%, transparent 60%),
                    radial-gradient(1000px 500px at 90% 120%, #f5d0fe 0%, transparent 60%),
                    #f8fafc;
        min-height: 100vh;
      }
      .wrap { max-width: 980px; margin: 56px auto; padding: 0 20px; }
      .card {
        background: rgba(255, 255, 255, 0.86);
        backdrop-filter: blur(10px);
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        padding: 28px;
        box-shadow: 0 18px 50px rgba(15, 23, 42, 0.08);
      }
      h1 { margin: 0 0 10px; font-size: 32px; }
      p { color: #475569; margin: 0 0 22px; }
      .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
      a {
        display: block;
        text-decoration: none;
        color: #0f172a;
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 14px;
        padding: 16px;
      }
      a:hover { border-color: #c084fc; box-shadow: 0 10px 20px rgba(168, 85, 247, 0.12); }
      .title { font-weight: 700; margin-bottom: 6px; }
      .desc { font-size: 13px; color: #64748b; line-height: 1.5; }
      @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>TikGen 视觉方案参考</h1>
        <p>以下为独立示意页面，仅供评审，不影响当前正式版本功能。</p>
        <div class="grid">
          <a href="/ui-concepts/concept-a.html">
            <div class="title">方案 A：Premium SaaS</div>
            <div class="desc">强调品牌感与高级渐变，适合登录前营销转化页。</div>
          </a>
          <a href="/ui-concepts/concept-b.html">
            <div class="title">方案 B：Creator Workspace</div>
            <div class="desc">强调创作效率与信息层级，适合登录后工作台首页。</div>
          </a>
          <a href="/ui-concepts/concept-c.html">
            <div class="title">方案 C：E-commerce Focus</div>
            <div class="desc">强调商品转化流程，适合“图/视频生成”核心场景。</div>
          </a>
        </div>
      </div>
    </div>
  </body>
  </html>
