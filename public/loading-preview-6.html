<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading Preview 6 - Neon Bars</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        font-family: Inter, "PingFang SC", sans-serif;
        background:
          radial-gradient(80rem 35rem at 50% 0%, rgba(34,211,238,.15), transparent 55%),
          linear-gradient(180deg,#070914,#020309);
      }
      .card {
        width: min(700px, 92vw);
        border-radius: 24px;
        border: 1px solid rgba(255,255,255,.12);
        background: rgba(8, 11, 27, .84);
        padding: 36px 30px;
        text-align: center;
      }
      h1 { margin: 0; color: #f5f7ff; font-size: 30px; }
      p { margin: 8px 0 22px; color: rgba(226,235,255,.72); }
      .bars { height: 68px; display: flex; align-items: end; justify-content: center; gap: 7px; }
      .bars i {
        width: 8px; border-radius: 8px;
        height: 16px;
        background: linear-gradient(180deg,#99f6ff,#b88dff);
        box-shadow: 0 0 12px rgba(120,204,255,.35);
        animation: up 1.1s ease-in-out infinite;
      }
      .bars i:nth-child(2){animation-delay:.1s}.bars i:nth-child(3){animation-delay:.2s}.bars i:nth-child(4){animation-delay:.3s}
      .bars i:nth-child(5){animation-delay:.4s}.bars i:nth-child(6){animation-delay:.5s}.bars i:nth-child(7){animation-delay:.6s}
      .bars i:nth-child(8){animation-delay:.7s}.bars i:nth-child(9){animation-delay:.8s}
      @keyframes up {
        0%,100%{ height: 14px; opacity: .45; }
        50%{ height: 64px; opacity: 1; }
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>高质量渲染中</h1>
      <p>正在执行多模型协同优化，确保画面稳定与清晰度。</p>
      <div class="bars"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></div>
    </section>
  </body>
  </html>
