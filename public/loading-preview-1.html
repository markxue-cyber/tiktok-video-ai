<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading Preview 1 - Orbital Ring</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, "PingFang SC", "Microsoft YaHei", sans-serif;
        background:
          radial-gradient(80rem 40rem at 10% -10%, rgba(139, 92, 246, .22), transparent 55%),
          radial-gradient(60rem 35rem at 95% 110%, rgba(59, 130, 246, .18), transparent 50%),
          linear-gradient(180deg, #090b1d, #04050f);
      }
      .panel {
        width: min(680px, 92vw);
        border: 1px solid rgba(255,255,255,.12);
        border-radius: 24px;
        padding: 44px 36px;
        background: rgba(10, 12, 32, .78);
        backdrop-filter: blur(14px);
        text-align: center;
        box-shadow: 0 24px 70px rgba(0,0,0,.45);
      }
      .orb-wrap {
        width: 96px; height: 96px; margin: 0 auto 20px; position: relative;
      }
      .orb {
        position: absolute; inset: 0; border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #b78cff;
        border-right-color: #57b2ff;
        animation: spin 1.5s linear infinite;
      }
      .orb::after {
        content: "";
        position: absolute;
        inset: 18px;
        border-radius: 50%;
        border: 2px solid rgba(183, 140, 255, .35);
        box-shadow: 0 0 24px rgba(129, 89, 255, .35);
      }
      .orb2 {
        position: absolute; inset: 10px; border-radius: 50%;
        border: 2px solid transparent;
        border-left-color: rgba(130, 190, 255, .85);
        border-bottom-color: rgba(196, 130, 255, .85);
        animation: spin-reverse 1.2s linear infinite;
      }
      .title {
        margin: 0;
        font-size: 30px;
        letter-spacing: .2px;
        color: #f3efff;
      }
      .desc {
        margin-top: 10px;
        color: rgba(235, 228, 255, .72);
        font-size: 16px;
      }
      .bar {
        margin: 22px auto 0;
        width: min(420px, 86%);
        height: 6px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255,255,255,.08);
      }
      .bar > i {
        display: block;
        height: 100%;
        width: 38%;
        border-radius: inherit;
        background: linear-gradient(90deg, #9d6bff, #43d0ff);
        animation: slide 1.8s ease-in-out infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes spin-reverse { to { transform: rotate(-360deg); } }
      @keyframes slide {
        0% { transform: translateX(-140%); }
        55% { transform: translateX(190%); }
        100% { transform: translateX(190%); }
      }
    </style>
  </head>
  <body>
    <section class="panel">
      <div class="orb-wrap">
        <div class="orb"></div>
        <div class="orb2"></div>
      </div>
      <h1 class="title">图片生成中</h1>
      <div class="desc">智能排版与细节优化正在进行，请稍等 5-15 秒…</div>
      <div class="bar"><i></i></div>
    </section>
  </body>
  </html>
