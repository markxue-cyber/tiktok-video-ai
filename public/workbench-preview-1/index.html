<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TikGen AI 工作台预览 1</title>
    <link rel="stylesheet" href="/workbench-preview/style.css" />
  </head>
  <body>
    <div class="wrap">
      <aside class="sidebar">
        <div class="brand">
          <div class="logo" aria-hidden="true"></div>
          <div class="title">TikGen AI</div>
        </div>

        <nav class="sideNav">
          <div class="navItem active">
            <div class="navIcon">创</div>
            <div class="navText">创作实验室</div>
          </div>
          <div class="navItem">
            <div class="navIcon">历</div>
            <div class="navText">历史传</div>
          </div>
          <div class="navItem">
            <div class="navIcon">生</div>
            <div class="navText">生成</div>
          </div>
          <div class="navItem">
            <div class="navIcon">资</div>
            <div class="navText">本地资产</div>
          </div>
          <div class="navItem">
            <div class="navIcon">预</div>
            <div class="navText">预设</div>
          </div>
        </nav>
      </aside>

      <main class="main">
        <header class="topbar">
          <div class="topLeft">
            <div class="crumb">创作实验室</div>
            <div class="pill">Deep Curtain UI</div>
          </div>
          <div class="search">
            <span style="opacity:.75;font-weight:900">⌕</span>
            <input value="搜索" />
          </div>
        </header>

        <section class="curtainRow">
          <div class="curtainBanner">
            <div class="bannerBadge">推荐任务</div>
            <div class="bannerTitle">深色幕布工作流</div>
            <div class="bannerSub">
              展示科技感界面：玻璃拟态面板、发光边框、渐变光晕与模块化布局。
            </div>
          </div>
          <div class="curtainBanner">
            <div class="bannerBadge">多模型</div>
            <div class="bannerTitle">视频 / 图片 / 工具</div>
            <div class="bannerSub">静态预览：不包含交互逻辑，仅呈现视觉结构。</div>
          </div>
        </section>

        <section class="toolGrid">
          <div class="toolCard">
            <div class="toolTop">
              <div class="toolIcon">AI</div>
              <div class="toolArrow">→</div>
            </div>
            <div class="toolLabel">图片生成</div>
          </div>
          <div class="toolCard">
            <div class="toolTop">
              <div class="toolIcon">AI</div>
              <div class="toolArrow">→</div>
            </div>
            <div class="toolLabel">视频生成</div>
          </div>
          <div class="toolCard">
            <div class="toolTop">
              <div class="toolIcon">QC</div>
              <div class="toolArrow">→</div>
            </div>
            <div class="toolLabel">电商质检</div>
          </div>
          <div class="toolCard">
            <div class="toolTop">
              <div class="toolIcon">FX</div>
              <div class="toolArrow">→</div>
            </div>
            <div class="toolLabel">风格增强</div>
          </div>
          <div class="toolCard">
            <div class="toolTop">
              <div class="toolIcon">UP</div>
              <div class="toolArrow">→</div>
            </div>
            <div class="toolLabel">画质提升</div>
          </div>
          <div class="toolCard">
            <div class="toolTop">
              <div class="toolIcon">SUB</div>
              <div class="toolArrow">→</div>
            </div>
            <div class="toolLabel">去字幕</div>
          </div>
        </section>

        <section class="bottomRow">
          <div class="panel">
            <div class="panelTitle">任务中心（视觉）</div>
            <div class="filters">
              <div class="filterBtn active">全部</div>
              <div class="filterBtn">处理中</div>
              <div class="filterBtn">失败</div>
            </div>
            <div style="height:86px;border-radius:16px;border:1px solid rgba(255,255,255,.10);background:rgba(0,0,0,.18)"></div>
          </div>

          <div class="panel">
            <div class="panelTitle">素材预览（静态）</div>
            <div class="thumbRow" style="margin-top:10px">
              <div class="thumb"><div class="thumbBadge">15s</div></div>
              <div class="thumb"><div class="thumbBadge">19s</div></div>
              <div class="thumb"><div class="thumbBadge">15s</div></div>
              <div class="thumb"><div class="thumbBadge">10s</div></div>
              <div class="thumb"><div class="thumbBadge">5s</div></div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
